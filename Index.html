<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فحص توافق فري فاير - FF Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; height: 100vh; display: flex; align-items: center; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            margin: auto;
            text-align: center;
        }
        .stat-val { color: #ff4b2b; font-size: 1.8rem; font-weight: bold; }
        .btn-fire {
            background: linear-gradient(90deg, #ff4b2b, #ff416c);
            border: none; border-radius: 12px; padding: 12px;
            color: white; font-weight: bold; width: 100%; margin-top: 20px;
        }
        .status-ready { color: #00ff88; }
        .status-low { color: #ff4b2b; }
    </style>
</head>
<body>

    <div class="glass-card shadow-lg">
        <h2 class="mb-4">FF <span style="color:#ff4b2b">CHECKER</span></h2>
        
        <div class="row">
            <div class="col-6">
                <small class="text-secondary">الرام التقريبي</small>
                <div class="stat-val" id="ram-val">--</div>
            </div>
            <div class="col-6">
                <small class="text-secondary">المعالج</small>
                <div class="stat-val" id="cpu-val">--</div>
            </div>
        </div>

        <hr class="my-4" style="opacity: 0.1;">

        <div id="result-area">
            <p>جاري فحص مواصفات هاتفك...</p>
        </div>

        <button class="btn btn-fire" onclick="checkDevice()">إعادة الفحص</button>
    </div>

    <script>
        function checkDevice() {
            // جلب عدد الأنوية
            const cores = navigator.hardwareConcurrency || "غير معروف";
            document.getElementById('cpu-val').innerText = cores;

            // جلب الرام (يعطي قيمة تقريبية في المتصفحات الحديثة)
            const ram = navigator.deviceMemory || "غير مدعوم";
            document.getElementById('ram-val').innerText = ram + "G";

            const resultArea = document.getElementById('result-area');

            if (ram !== "غير مدعوم" && ram >= 2) {
                resultArea.innerHTML = '<h4 class="status-ready">✅ جهازك متوافق!</h4><p class="small text-secondary">يمكنك تشغيل اللعبة بسلاسة.</p>';
            } else if (ram === "غير مدعوم") {
                resultArea.innerHTML = '<h4>⚠️ تعذر تحديد الرام بدقة</h4><p class="small text-secondary">يرجى تجربة المتصفح الرسمي للهاتف.</p>';
            } else {
                resultArea.innerHTML = '<h4 class="status-low">❌ مواصفات ضعيفة</h4><p class="small text-secondary">قد تعاني من الـ Lag أثناء اللعب.</p>';
            }
        }

        // تشغيل الفحص عند تحميل الصفحة
        window.onload = checkDevice;
    </script>
</body>
</html>
