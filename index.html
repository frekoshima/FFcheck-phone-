<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF OS | Advanced Device Lab</title>

<link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/controller.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root { --primary: #ff4b2b; --cyan: #00f2ff; --bg-main: #050507; --glass: rgba(20, 20, 25, 0.7); }
body { 
    background: var(--bg-main); 
    background-image: radial-gradient(circle at 50% 0%, rgba(255, 75, 43, 0.15), transparent 50%);
    color: #fff; 
    font-family: 'Rajdhani', sans-serif; 
    min-height: 100vh;
}
.app-container { max-width: 900px; margin: 0 auto; padding: 20px; }
.glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.3s ease; }
.top-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
.nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 1.1rem; transition: 0.3s; }
.nav-btn:hover, .nav-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 0 15px rgba(255,75,43,0.4); }
.stat-label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
.stat-value { font-size: 2.2rem; font-weight: 700; color: var(--cyan); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
.game-card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
.game-ready { border-left-color: #00ff88; }
.game-fail { border-left-color: var(--primary); }
.cyber-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; padding: 15px; width: 100%; margin-bottom: 20px; font-family: inherit; }
.btn-submit { background: linear-gradient(45deg, var(--primary), #ff416c); border: none; color: white; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
.page-content { display: none; animation: fadeIn 0.4s ease forwards; }
.page-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
#cta { display:none; text-align:center; margin-top:20px; }
#cta button { padding:15px 25px; font-size:1.3rem; border:none; border-radius:10px; cursor:pointer; background:linear-gradient(45deg,var(--primary),#ff416c); color:#fff; transition:0.3s;}
.timer { margin-bottom:10px; font-weight:bold; color:#ffcc00; font-size:1.2rem; }
</style>
</head>

<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TVPBTS8B"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div class="app-container pt-4">
    <div class="text-center mb-4">
        <h1 class="fw-bold" style="font-size: 3rem;">FF <span style="color:var(--primary)">OS</span></h1>
        <p class="text-secondary" style="letter-spacing: 3px;">PRO GAMING ANALYTICS</p>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="switchPage('scanner', this)"><i class="fas fa-radar me-2"></i> Scanner</button>
        <button class="nav-btn" onclick="switchPage('games', this)"><i class="fas fa-gamepad me-2"></i> Games</button>
        <button class="nav-btn" onclick="switchPage('contact', this)"><i class="fas fa-envelope me-2"></i> Contact</button>
    </div>

    <div id="scanner" class="page-content active">
        <div class="row">
            <div class="col-md-8">
                <div class="glass-panel h-100">
                    <h5 class="mb-4"><i class="fas fa-microchip me-2 text-secondary"></i> System Hardware</h5>
                    <div class="row text-center">
                        <div class="col-6 mb-4"><div class="stat-label">RAM Memory</div><div class="stat-value" id="sys-ram">--</div></div>
                        <div class="col-6 mb-4"><div class="stat-label">CPU Cores</div><div class="stat-value" id="sys-cpu" style="color:#fff;">--</div></div>
                        <div class="col-12 mt-2"><div class="stat-label">Est. Free Fire Max FPS</div><div class="stat-value" id="sys-fps" style="color:#00ff88; font-size: 3rem;">--</div></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mt-4 mt-md-0">
                <div class="glass-panel h-100 d-flex flex-column justify-content-center text-center">
                    <h5 class="mb-4 text-start"><i class="fas fa-wifi me-2 text-secondary"></i> Network</h5>
                    <div class="stat-label">Ping Latency</div><div class="stat-value mb-4" id="sys-ping">...</div>
                    <div class="stat-label">Connection Type</div><div class="stat-value" id="sys-net" style="color:#fff; font-size: 1.5rem;">Scanning...</div>
                </div>
            </div>
        </div>
        <button class="btn-submit mt-3" onclick="location.reload()"><i class="fas fa-sync-alt me-2"></i> RE-SCAN DEVICE</button>
    </div>

    <div id="games" class="page-content">
        <div class="glass-panel">
            <h5 class="mb-4"><i class="fas fa-check-circle me-2 text-secondary"></i> Compatibility Results</h5>
            <div id="games-container"></div>
        </div>
    </div>

    <div id="contact" class="page-content">
        <div class="glass-panel">
            <h5 class="mb-4"><i class="fas fa-paper-plane me-2 text-secondary"></i> Send us a message</h5>
            <form action="https://formspree.io/f/mkovlyep" method="POST">
                <input type="email" name="email" class="cyber-input" placeholder="Your Email Address" required>
                <input type="text" name="subject" class="cyber-input" placeholder="Subject" required>
                <textarea name="message" class="cyber-input" rows="5" placeholder="Write your message here..." required></textarea>
                <button type="submit" class="btn-submit">SEND MESSAGE <i class="fas fa-arrow-right ms-2"></i></button>
            </form>
        </div>
    </div>

    <div id="cta">
        <div class="timer">Offer expires in <span id="countdown">02:00</span></div>
        <a id="offer-link" href="https://go2me.fun/go/13725/1" target="_blank"><button>Unlock Optimization</button></a>
    </div>
</div>

<script>
function switchPage(pageId, btnElement) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    btnElement.classList.add('active');
}

async function runMasterScan() {
    const ram = navigator.deviceMemory || 2;
    const cores = navigator.hardwareConcurrency || 4;
    document.getElementById('sys-ram').innerText = ram + " GB";
    document.getElementById('sys-cpu').innerText = cores;
    let estimatedFps = ram>=6 && cores>=8 ? 90 : (ram>=4 && cores>=6 ? 60 : (ram>=3 ? 45 : 30));
    document.getElementById('sys-fps').innerText = estimatedFps + " FPS";
    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    document.getElementById('sys-net').innerText = connection ? connection.effectiveType.toUpperCase() : "WIFI/LAN";
    const start = Date.now();
    try { await fetch('https://www.google.com/favicon.ico', {mode:'no-cors'}); const ping = Date.now() - start; const pingEl = document.getElementById('sys-ping'); pingEl.innerText = ping+"ms"; pingEl.style.color = ping<80?"#00ff88":(ping<150?"#ffcc00":"#ff4b2b"); } catch(e){ document.getElementById('sys-ping').innerText="ERR"; }
    const games = [{name:"Free Fire MAX", minRam:3, icon:"🔥"}, {name:"Free Fire (Standard)", minRam:2, icon:"🎯"}, {name:"PUBG Mobile", minRam:4, icon:"🔫"}, {name:"Call of Duty: Warzone Mobile", minRam:6, icon:"🚁"}];
    const list = document.getElementById('games-container'); list.innerHTML="";
    games.forEach(g=>{ const isReady = ram>=g.minRam; list.innerHTML += `<div class="game-card ${isReady?'game-ready':'game-fail'}"><div style="font-size:1.2rem;"><span class="me-3">${g.icon}</span> <span class="fw-bold">${g.name}</span></div><span style="color:${isReady?'#00ff88':'#ff4b2b'}; font-weight:bold;">${isReady?'SYSTEM READY':'UPGRADE NEEDED'}</span></div>`; });
    document.getElementById('cta').style.display='block';
    startTimer();
    updateOfferLink();
}

function updateOfferLink(){
    const offer="https://mobtalk.xyz/cpa/13725/1809";
    fetch('https://ipapi.co/json/').then(res=>res.json()).then(data=>{
        const geo = data.country_code;
        document.getElementById("offer-link").href=offer+"?geo="+geo;
    }).catch(e=>{ document.getElementById("offer-link").href=offer; });
}

function startTimer(duration=120){
    let timer=duration, minutes, seconds;
    const countdown = document.getElementById('countdown');
    const interval=setInterval(()=>{
        minutes=parseInt(timer/60,10); seconds=parseInt(timer%60,10);
        countdown.textContent=`${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        if(--timer<0) clearInterval(interval);
    },1000);
}
window.onload = runMasterScan;
</script>
</body>
</html>
