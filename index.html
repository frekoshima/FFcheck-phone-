<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Compatibility Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #ff4b2b; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #0c0c0e; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .hero-section { padding: 40px 20px; text-align: center; }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #444;
        }
        .game-card.ready { border-left-color: #00ff88; }
        .game-card.fail { border-left-color: #ff4b2b; }
        .stat-badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 50px; font-weight: bold; }
        .badge-check { font-size: 0.8rem; padding: 3px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container" style="max-width: 500px;">
    <div class="hero-section">
        <h1 class="fw-bold">GAME <span style="color:var(--accent)">TESTER</span></h1>
        <p class="text-secondary small">اكتشف الألعاب التي تعمل على هاتفك</p>
    </div>

    <div class="glass-card shadow-sm">
        <div class="row text-center">
            <div class="col-6">
                <p class="text-secondary small mb-1">الرام (RAM)</p>
                <div class="stat-badge" id="user-ram">--</div>
            </div>
            <div class="col-6">
                <p class="text-secondary small mb-1">المعالج</p>
                <div class="stat-badge" id="user-cpu">--</div>
            </div>
        </div>
    </div>

    <h5 class="mb-3 px-2">قائمة الألعاب المتوافقة:</h5>
    
    <div id="game-list"></div>

    <button class="btn btn-outline-danger w-100 mt-4 border-secondary text-white" onclick="location.reload()">تحديث الفحص</button>
</div>

<script>
    const games = [
        { name: "Free Fire", minRam: 2, icon: "🔥" },
        { name: "PUBG Mobile", minRam: 3, icon: "🔫" },
        { name: "Call of Duty", minRam: 4, icon: "🎖️" },
        { name: "Genshin Impact", minRam: 6, icon: "✨" },
        { name: "Subway Surfers", minRam: 1, icon: "🏃" }
    ];

    function runCheck() {
        const ram = navigator.deviceMemory || 2; // افتراضي 2 إذا لم يدعم المتصفح القيمة
        const cores = navigator.hardwareConcurrency || "N/A";

        document.getElementById('user-ram').innerText = ram + " GB";
        document.getElementById('user-cpu').innerText = cores + " Core";

        const listContainer = document.getElementById('game-list');
        listContainer.innerHTML = "";

        games.forEach(game => {
            const isReady = ram >= game.minRam;
            const statusClass = isReady ? "ready" : "fail";
            const statusText = isReady ? "✅ متوافقة" : "❌ ضعيف";
            const badgeClass = isReady ? "bg-success" : "bg-danger";

            listContainer.innerHTML += `
                <div class="game-card ${statusClass}">
                    <div>
                        <span class="me-2">${game.icon}</span>
                        <strong>${game.name}</strong>
                    </div>
                    <span class="badge ${badgeClass} badge-check">${statusText}</span>
                </div>
            `;
        });
    }

    window.onload = runCheck;
</script>
</body>
</html>
