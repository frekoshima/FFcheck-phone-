<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF OS | Advanced Device Lab</title>

<link rel="icon" type="image/png" href="https://img.icons8.com/neon/96/controller.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root { --primary:#ff4b2b; --cyan:#00f2ff; --bg-main:#050507; --glass:rgba(20,20,25,0.7); }

body{
background:var(--bg-main);
background-image:radial-gradient(circle at 50% 0%, rgba(255,75,43,0.15), transparent 50%);
color:#fff;
font-family:'Rajdhani',sans-serif;
min-height:100vh;
}

.app-container{max-width:900px;margin:0 auto;padding:20px;}

.glass-panel{
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.05);
border-radius:20px;
padding:30px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.top-nav{display:flex;justify-content:center;gap:15px;margin-bottom:30px;flex-wrap:wrap;}

.nav-btn{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
color:#aaa;
padding:10px 25px;
border-radius:30px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.nav-btn:hover,.nav-btn.active{
background:var(--primary);
color:#fff;
border-color:var(--primary);
}

.stat-label{font-size:.9rem;color:#888;text-transform:uppercase;letter-spacing:2px;}
.stat-value{font-size:2.2rem;font-weight:700;color:var(--cyan);}

.game-card{
background:rgba(0,0,0,0.3);
border-radius:15px;
padding:15px 20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid transparent;
}

.game-ready{border-left-color:#00ff88;}
.game-fail{border-left-color:var(--primary);}

.btn-submit{
background:linear-gradient(45deg,var(--primary),#ff416c);
border:none;
color:white;
padding:15px;
border-radius:10px;
width:100%;
font-size:1.2rem;
font-weight:bold;
cursor:pointer;
}

.page-content{display:none;}
.page-content.active{display:block;}
</style>
</head>

<body>
<div class="app-container pt-4">

<div class="text-center mb-4">
<h1 class="fw-bold" style="font-size:3rem;">FF <span style="color:var(--primary)">OS</span></h1>
<p class="text-secondary">PRO GAMING ANALYTICS</p>
</div>

<div class="top-nav">
<button class="nav-btn active" onclick="switchPage('scanner', this)">Scanner</button>
<button class="nav-btn" onclick="switchPage('games', this)">Games</button>
</div>

<div id="scanner" class="page-content active">

<div class="glass-panel text-center">
<div class="stat-label">RAM</div>
<div class="stat-value" id="sys-ram">--</div>

<div class="stat-label mt-3">CPU Cores</div>
<div class="stat-value" id="sys-cpu" style="color:#fff;">--</div>

<div class="stat-label mt-3">Estimated FPS</div>
<div class="stat-value" id="sys-fps" style="color:#00ff88;font-size:3rem;">--</div>

<div class="stat-label mt-3">Ping</div>
<div class="stat-value" id="sys-ping">...</div>
</div>

<button class="btn-submit mt-3" onclick="location.reload()">RE-SCAN DEVICE</button>

<!-- CPA SECTION -->
<div id="boost-offer" class="glass-panel text-center mt-4" style="display:none;">
<h4 style="color:#ff4b2b;">⚡ Low Performance Detected</h4>
<p class="text-secondary">Optimize your device for smoother gameplay</p>

<button onclick="goToOffer(event)" class="btn-submit">
BOOST FPS NOW 🚀
</button>

<p id="countdown" style="margin-top:10px;color:#888;"></p>
</div>

</div>

<div id="games" class="page-content">
<div class="glass-panel">
<h5>Compatibility</h5>
<div id="games-container"></div>
</div>
</div>

</div>

<script>

// ==== ضع رابط Mobieasy هنا ====
const CPA_LINK = "PUT_YOUR_MOBIEASY_LINK_HERE";

// Navigation
function switchPage(pageId,btn){
document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
btn.classList.add('active');
}

// Redirect with countdown
function goToOffer(event){
const btn = event.target;
btn.disabled = true;
let time = 3;

const counter = document.getElementById("countdown");

const interval = setInterval(()=>{
counter.innerText = "Redirecting in "+time+"...";
time--;

if(time < 0){
clearInterval(interval);
window.location.href = CPA_LINK;
}
},1000);
}

// Main Scan
async function runMasterScan(){

const ram = navigator.deviceMemory || 2;
const cores = navigator.hardwareConcurrency || 4;

document.getElementById('sys-ram').innerText = ram+" GB";
document.getElementById('sys-cpu').innerText = cores;

let estimatedFps = 30;
if(ram>=6 && cores>=8) estimatedFps=90;
else if(ram>=4 && cores>=6) estimatedFps=60;
else if(ram>=3) estimatedFps=45;

document.getElementById('sys-fps').innerText = estimatedFps+" FPS";

// Show CPA only if FPS < 60
if(estimatedFps < 60){
document.getElementById('boost-offer').style.display="block";
}

// Ping
const start = Date.now();
try{
await fetch('https://www.google.com/favicon.ico',{mode:'no-cors'});
const ping = Date.now()-start;
document.getElementById('sys-ping').innerText = ping+" ms";
}catch{
document.getElementById('sys-ping').innerText="--";
}

// Games
const games = [
{name:"Free Fire MAX",minRam:3},
{name:"PUBG Mobile",minRam:4},
{name:"Warzone Mobile",minRam:6}
];

const list = document.getElementById('games-container');
list.innerHTML="";

games.forEach(g=>{
const ready = ram>=g.minRam;
list.innerHTML+=`
<div class="game-card ${ready?'game-ready':'game-fail'}">
<span>${g.name}</span>
<span style="color:${ready?'#00ff88':'#ff4b2b'};">
${ready?'READY':'UPGRADE NEEDED'}
</span>
</div>`;
});

}

window.onload = runMasterScan;

</script>
</body>
</html>
