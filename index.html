.top-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
.nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 1.1rem; transition: 0.3s; }

.page-content { display: none; animation: fadeIn 0.4s ease forwards; }
.page-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

#cta button { padding:15px 25px; font-size:1.3rem; border:none; border-radius:10px; cursor:pointer; background:linear-gradient(45deg,var(--primary),#ff416c); color:#fff; transition:0.3s;}

<div class="app-container pt-4">
    <div class="text-center mb-4">
        <h1 class="fw-bold" style="font-size: 3rem;">FF <span style="color:var(--primary)">OS</span></h1>
        <p class="text-secondary" style="letter-spacing: 3px;">PRO GAMING ANALYTICS</p>
    </div>

    <div class="top-nav">
        <button class="nav-btn active" onclick="switchPage('scanner', this)"><i class="fas fa-radar me-2"></i> Scanner</button>
        <button class="nav-btn" onclick="switchPage('games', this)"><i class="fas fa-gamepad me-2"></i> Games</button>
        <button class="nav-btn" onclick="switchPage('contact', this)"><i class="fas fa-envelope me-2"></i> Contact</button>

    <div id="scanner" class="page-content active">
        <div class="row">
            <div class="col-md-8">
                <div class="glass-panel h-100">
                    <h5 class="mb-4"><i class="fas fa-microchip me-2 text-secondary"></i> System Hardware</h5>
                    <div class="row text-center">
                        <div class="col-6 mb-4"><div class="stat-label">RAM Memory</div><div class="stat-value" id="sys-ram">--</div></div>
                        <div class="col-6 mb-4"><div class="stat-label">CPU Cores</div><div class="stat-value" id="sys-cpu" style="color:#fff;">--</div></div>
                        <div class="col-12 mt-2"><div class="stat-label">Est. Free Fire Max FPS</div><div class="stat-value" id="sys-fps" style="color:#00ff88; font-size: 3rem;">--</div></div>

                </div>
            </div>

        <p class="stat-label" style="font-size: 0.7rem;">Live Server Status</p>
        <script id="_waup6i">var _wau = _wau || []; _wau.push(["small", "ffos_live", "p6i"]);</script>
        <script async src="//waust.at/s.js"></script>

<script>
function switchPage(pageId, btnElement) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    btnElement.classList.add('active');
}
async function runMasterScan() {
    const ram = navigator.deviceMemory || 2;
    const cores = navigator.hardwareConcurrency || 4;
    document.getElementById('sys-ram').innerText = ram + " GB";
    document.getElementById('sys-cpu').innerText = cores;
    document.getElementById('sys-fps').innerText = (ram>=4 ? 60 : 30) + " FPS";
    document.getElementById('cta').style.display='block';
}
window.onload = runMasterScan;
</script>
